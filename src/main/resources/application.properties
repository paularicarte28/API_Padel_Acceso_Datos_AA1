# =============================================
# CONFIGURACIÓN SERVIDOR
# =============================================
server.port=8080

# =============================================
# CONFIGURACIÓN BASE DE DATOS (MariaDB)
# =============================================
spring.datasource.url=jdbc:mariadb://localhost:3307/padelzgz
spring.datasource.username=padeluser
spring.datasource.password=padelpass
spring.datasource.driver-class-name=org.mariadb.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.globally_quoted_identifiers=true
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# =============================================
# CONFIGURACIÓN JWT
# =============================================
jwt.secret=padelzgzSecretKeyMuyLargaParaQueSeaSegura2024XYZ123456789ABC
jwt.expiration=86400000

# =============================================
# CONFIGURACIÓN LOGS
# =============================================
logging.level.org.springframework=WARN
logging.level.org.hibernate=WARN
logging.level.com.padelzgz=INFO

# =============================================
# SPRINGDOC / SWAGGER
# =============================================
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
